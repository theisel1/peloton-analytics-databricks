resources:
  jobs:
    peloton_workout_scoring:
      name: Peloton Workout Scoring
      max_concurrent_runs: 1
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - pandas>=2.2.0
              - scikit-learn>=1.5.0
              - numpy>=1.26.0
              - joblib>=1.4.0
              - mlflow>=2.16.0
      tasks:
        - task_key: 01_score
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/06_scoring.py
            source: WORKSPACE
            base_parameters:
              repo_root: ${workspace.file_path}
              catalog: ${var.catalog}
              schema: ${var.schema}
              artifact_base_path: ${var.artifact_base_path}
              model_source: mlflow_latest
              model_path: ""
              mlflow_experiment_name: /Users/${workspace.current_user.userName}/peloton-analytics
              mlflow_run_name: ${var.mlflow_run_name}
              mlflow_run_id: ""
              mode: batch
              score_limit: "250"
              output_table: ${var.catalog}.${var.schema}.gold_peloton_total_work_predictions
